# RetinaTag — base Docker Compose config
# Do not use directly. Use docker-compose.prod.yml or docker-compose.stage.yml as overlay.
# See CONTRIBUTING.md for usage.

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    volumes:
      # REQUIRED: set OCT_DATA_PATH in .env to your image directory on the host
      - ${OCT_DATA_PATH:-/data/oct-500}:/mnt/oct-data:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/database/oct_labeler.db
      - DATA_DIR=/app/data
      - CACHE_DIR=/app/data/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
